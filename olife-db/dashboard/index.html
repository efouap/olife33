<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>O LIFE — DB Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08090a;--s1:#0e1012;--s2:#141618;--s3:#1c1f22;
  --border:#232629;--border2:#2e3236;
  --text:#c8cdd2;--hi:#eef0f2;--dim:#4a5260;--muted:#6b7585;
  --green:#00d97e;--green-d:#051a0f;--green-b:#0a3320;
  --red:#ff4757;--red-d:#1a0508;--red-b:#3d0a10;
  --amber:#ffa502;--amber-d:#1a0e00;--amber-b:#3d2200;
  --blue:#3d8bff;--blue-d:#040d1a;--blue-b:#0a1f3d;
  --teal:#00c6d4;
  --f-mono:'IBM Plex Mono',monospace;
  --f-sans:'IBM Plex Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text)}
body{font-family:var(--f-sans);display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ── */
.topbar{
  height:48px;display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;gap:0;
}
.topbar-brand{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;height:100%;border-right:1px solid var(--border);
  flex-shrink:0;
}
.brand-sq{
  width:20px;height:20px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--f-mono);font-size:10px;font-weight:600;color:#000;
}
.brand-txt{
  font-family:var(--f-mono);font-size:12px;font-weight:500;
  color:var(--hi);letter-spacing:.08em;
}
.topbar-tabs{display:flex;height:100%;flex:1}
.tab{
  display:flex;align-items:center;gap:8px;
  padding:0 20px;height:100%;
  font-family:var(--f-mono);font-size:11px;font-weight:500;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--dim);cursor:pointer;
  border-right:1px solid var(--border);
  transition:color .15s,background .15s;
  white-space:nowrap;
}
.tab:hover{color:var(--text);background:var(--s2)}
.tab.active{color:var(--hi);background:var(--s2);border-bottom:2px solid var(--green)}
.tab-count{
  font-size:9px;background:var(--s3);color:var(--muted);
  padding:2px 6px;border-radius:10px;
}
.tab.active .tab-count{background:var(--green-b);color:var(--green)}

.topbar-right{
  margin-left:auto;display:flex;align-items:center;gap:0;
  height:100%;border-left:1px solid var(--border);
}
.conn-area{
  display:flex;align-items:center;gap:10px;padding:0 16px;
  height:100%;border-right:1px solid var(--border);
}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.conn-dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:breathe 2s infinite}
@keyframes breathe{50%{opacity:.4}}
.conn-label{font-family:var(--f-mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
.conn-input{
  background:transparent;border:none;outline:none;
  font-family:var(--f-mono);font-size:10px;color:var(--text);
  width:260px;letter-spacing:.02em;
}
.conn-input::placeholder{color:var(--dim)}
.btn-connect{
  font-family:var(--f-mono);font-size:10px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  background:var(--green);color:#000;border:none;
  padding:0 16px;height:100%;cursor:pointer;transition:background .15s;
}
.btn-connect:hover{background:#00f590}
.btn-connect:disabled{background:var(--s3);color:var(--dim);cursor:default}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:200px;flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--s1);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.sb-section{padding:16px 0}
.sb-label{
  font-family:var(--f-mono);font-size:9px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;color:var(--dim);
  padding:0 16px 8px;
}
.sb-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 16px;cursor:pointer;transition:background .1s;
  font-family:var(--f-mono);font-size:11px;color:var(--muted);
}
.sb-item:hover{background:var(--s2);color:var(--text)}
.sb-item.active{background:var(--s2);color:var(--hi);border-right:2px solid var(--green)}
.sb-item-name{letter-spacing:.04em}
.sb-item-count{
  font-size:9px;color:var(--dim);background:var(--s3);
  padding:1px 6px;border-radius:8px;
}
.sb-divider{height:1px;background:var(--border);margin:4px 0}

/* ── MAIN PANEL ── */
.panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.panel-toolbar{
  height:42px;display:flex;align-items:center;gap:12px;
  padding:0 20px;border-bottom:1px solid var(--border);
  background:var(--s1);flex-shrink:0;
}
.toolbar-title{
  font-family:var(--f-mono);font-size:11px;font-weight:500;
  color:var(--hi);letter-spacing:.06em;text-transform:uppercase;
}
.toolbar-spacer{flex:1}
.toolbar-btn{
  font-family:var(--f-mono);font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;
  background:transparent;border:1px solid var(--border2);
  color:var(--muted);padding:5px 12px;cursor:pointer;
  transition:all .15s;border-radius:2px;
}
.toolbar-btn:hover{border-color:var(--teal);color:var(--teal)}
.toolbar-search{
  background:var(--s2);border:1px solid var(--border2);
  color:var(--text);font-family:var(--f-mono);font-size:11px;
  padding:5px 10px;outline:none;width:200px;
  transition:border-color .15s;
}
.toolbar-search:focus{border-color:var(--green)}
.toolbar-search::placeholder{color:var(--dim)}

/* ── TABLE ── */
.table-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-family:var(--f-mono);font-size:12px}
thead th{
  position:sticky;top:0;z-index:5;
  background:var(--s2);
  font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:var(--dim);padding:10px 16px;text-align:left;
  border-bottom:1px solid var(--border2);
  cursor:pointer;user-select:none;white-space:nowrap;
}
thead th:hover{color:var(--text)}
thead th.sort-asc::after{content:' ↑';color:var(--green)}
thead th.sort-desc::after{content:' ↓';color:var(--green)}

tbody tr{
  border-bottom:1px solid #0f1215;
  transition:background .1s;
  animation:rowIn .2s ease both;
}
@keyframes rowIn{from{opacity:0;transform:translateX(-4px)}to{opacity:1;transform:none}}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody td{
  padding:10px 16px;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;
}
.cell-uuid{color:var(--dim);font-size:11px}
.cell-email{color:var(--teal)}
.cell-ts{color:var(--muted);font-size:11px}
.cell-num{text-align:right;color:var(--hi);font-weight:500}
.cell-hash{color:var(--dim);font-size:10px;max-width:120px}

.badge{
  font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 8px;display:inline-block;border-radius:2px;
}
.badge-complete {background:var(--green-d);color:var(--green);border:1px solid var(--green-b)}
.badge-running  {background:var(--blue-d);color:var(--blue);border:1px solid var(--blue-b)}
.badge-pending  {background:var(--s3);color:var(--muted);border:1px solid var(--border2)}
.badge-failed   {background:var(--red-d);color:var(--red);border:1px solid var(--red-b)}
.badge-cancelled{background:var(--amber-d);color:var(--amber);border:1px solid var(--amber-b)}
.badge-credit   {background:var(--green-d);color:var(--green);border:1px solid var(--green-b)}
.badge-debit    {background:var(--red-d);color:var(--red);border:1px solid var(--red-b)}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:12px;color:var(--dim);
  font-family:var(--f-mono);font-size:12px;letter-spacing:.06em;
}
.empty-icon{font-size:28px;opacity:.3}

/* ── BOTTOM STATUS BAR ── */
.statusbar{
  height:28px;display:flex;align-items:center;gap:20px;
  padding:0 16px;border-top:1px solid var(--border);
  background:var(--s1);flex-shrink:0;font-family:var(--f-mono);font-size:10px;
}
.sb-seg{color:var(--dim);letter-spacing:.04em}
.sb-seg span{color:var(--text)}
.sb-right{margin-left:auto;display:flex;gap:16px;align-items:center}
.realtime-badge{
  display:flex;align-items:center;gap:6px;
  color:var(--dim);letter-spacing:.06em;
}
.rt-dot{width:5px;height:5px;border-radius:50%;background:var(--dim)}
.rt-dot.active{background:var(--green);animation:breathe 1.5s infinite}

/* ── DETAIL DRAWER ── */
.drawer{
  position:fixed;right:0;top:48px;bottom:28px;
  width:480px;background:var(--s1);border-left:1px solid var(--border2);
  transform:translateX(100%);transition:transform .25s ease;
  display:flex;flex-direction:column;z-index:100;overflow:hidden;
}
.drawer.open{transform:none}
.drawer-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.drawer-title{font-family:var(--f-mono);font-size:12px;font-weight:500;color:var(--hi);flex:1}
.drawer-close{
  background:none;border:none;color:var(--muted);font-size:18px;
  cursor:pointer;padding:4px 8px;transition:color .15s;
  font-family:var(--f-mono);
}
.drawer-close:hover{color:var(--red)}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.drawer-field{margin-bottom:16px}
.drawer-label{
  font-family:var(--f-mono);font-size:9px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;
}
.drawer-val{font-family:var(--f-mono);font-size:12px;color:var(--text);line-height:1.6}
.drawer-json{
  background:var(--bg);border:1px solid var(--border);
  padding:12px;font-family:var(--f-mono);font-size:10px;color:var(--muted);
  white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;
  line-height:1.6;
}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2)}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-sq">DB</div>
    <div class="brand-txt">O LIFE</div>
  </div>
  <div class="topbar-tabs">
    <div class="tab active" data-table="users">     Users     <span class="tab-count" id="tc-users">—</span></div>
    <div class="tab"        data-table="missions">  Missions  <span class="tab-count" id="tc-missions">—</span></div>
    <div class="tab"        data-table="audit_logs">Audit Log <span class="tab-count" id="tc-audit">—</span></div>
    <div class="tab"        data-table="olst_tokens">OLST Tokens<span class="tab-count" id="tc-olst">—</span></div>
  </div>
  <div class="topbar-right">
    <div class="conn-area">
      <div class="conn-dot" id="connDot"></div>
      <div class="conn-label" id="connLabel">DISCONNECTED</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 12px;height:100%;border-right:1px solid var(--border)">
      <input class="conn-input" id="supabaseUrl"  placeholder="https://xxx.supabase.co" />
      <input class="conn-input" id="supabaseKey"  placeholder="anon key or service role key" type="password" style="width:180px" />
    </div>
    <button class="btn-connect" id="btnConnect">Connect</button>
  </div>
</div>

<!-- ── BODY ── -->
<div class="body">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-section">
      <div class="sb-label">Tables</div>
      <div class="sb-item active" data-table="users">
        <span class="sb-item-name">users</span>
        <span class="sb-item-count" id="sb-users">—</span>
      </div>
      <div class="sb-item" data-table="missions">
        <span class="sb-item-name">missions</span>
        <span class="sb-item-count" id="sb-missions">—</span>
      </div>
      <div class="sb-item" data-table="audit_logs">
        <span class="sb-item-name">audit_logs</span>
        <span class="sb-item-count" id="sb-audit">—</span>
      </div>
      <div class="sb-item" data-table="olst_tokens">
        <span class="sb-item-name">olst_tokens</span>
        <span class="sb-item-count" id="sb-olst">—</span>
      </div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-section">
      <div class="sb-label">Views</div>
      <div class="sb-item" data-table="user_summary">
        <span class="sb-item-name">user_summary</span>
      </div>
      <div class="sb-item" data-table="mission_feed">
        <span class="sb-item-name">mission_feed</span>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="panel">
    <div class="panel-toolbar">
      <div class="toolbar-title" id="panelTitle">users</div>
      <div class="toolbar-spacer"></div>
      <input class="toolbar-search" id="searchBox" placeholder="Filter rows…" />
      <button class="toolbar-btn" id="btnRefresh">↻ Refresh</button>
      <button class="toolbar-btn" id="btnExport">↓ CSV</button>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="empty-state">
        <div class="empty-icon">◫</div>
        Connect to Supabase to view live data
      </div>
    </div>
  </div>
</div>

<!-- ── STATUS BAR ── -->
<div class="statusbar">
  <div class="sb-seg">Table: <span id="sbTable">—</span></div>
  <div class="sb-seg">Rows: <span id="sbRows">—</span></div>
  <div class="sb-seg">Loaded: <span id="sbLoaded">—</span></div>
  <div class="sb-right">
    <div class="realtime-badge">
      <div class="rt-dot" id="rtDot"></div>
      <span id="rtLabel">Realtime: off</span>
    </div>
    <div class="sb-seg" id="sbStatus">Ready</div>
  </div>
</div>

<!-- ── DETAIL DRAWER ── -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title" id="drawerTitle">Row Detail</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

// ── STATE ──────────────────────────────────────────────────────────────────
let supabase       = null;
let currentTable   = 'users';
let allRows        = [];
let realtimeChannel= null;
let sortCol        = null;
let sortAsc        = true;

// ── TABLE SCHEMAS ──────────────────────────────────────────────────────────
const SCHEMAS = {
  users: {
    cols: [
      { key: 'id',         label: 'ID',         render: uuidCell },
      { key: 'email',      label: 'Email',       render: r => `<span class="cell-email">${esc(r.email)}</span>` },
      { key: 'pin_hash',   label: 'PIN Hash',    render: r => `<span class="cell-hash">${esc((r.pin_hash||'').slice(0,20))}…</span>` },
      { key: 'created_at', label: 'Created',     render: tsCell },
    ],
    order: 'created_at',
    realtime: false,
  },
  missions: {
    cols: [
      { key: 'id',         label: 'ID',          render: uuidCell },
      { key: 'user_id',    label: 'User',         render: r => uuidCell(r, 'user_id') },
      { key: 'mission',    label: 'Mission',      render: r => `<code style="color:var(--teal);font-size:11px">${esc(r.mission)}</code>` },
      { key: 'status',     label: 'Status',       render: r => `<span class="badge badge-${esc(r.status)}">${esc(r.status)}</span>` },
      { key: 'created_at', label: 'Created',      render: tsCell },
      { key: 'updated_at', label: 'Updated',      render: tsCell },
    ],
    order: 'created_at',
    realtime: true,
  },
  audit_logs: {
    cols: [
      { key: 'id',        label: 'ID',           render: uuidCell },
      { key: 'user_id',   label: 'User',          render: r => uuidCell(r, 'user_id') },
      { key: 'action',    label: 'Action',        render: r => `<code style="color:var(--amber);font-size:11px">${esc(r.action)}</code>` },
      { key: 'metadata',  label: 'Metadata',      render: r => `<span class="cell-hash">${esc(JSON.stringify(r.metadata||{}).slice(0,40))}…</span>` },
      { key: 'timestamp', label: 'Time',          render: r => tsCell(r, 'timestamp') },
    ],
    order: 'timestamp',
    realtime: false,
  },
  olst_tokens: {
    cols: [
      { key: 'id',         label: 'ID',          render: uuidCell },
      { key: 'user_id',    label: 'User',         render: r => uuidCell(r, 'user_id') },
      { key: 'amount',     label: 'Amount',       render: r => {
        const n = Number(r.amount);
        const cls = n >= 0 ? 'badge-credit' : 'badge-debit';
        return `<span class="badge ${cls}">${n >= 0 ? '+' : ''}${n.toFixed(4)} OLST</span>`;
      }},
      { key: 'chain',      label: 'Chain',        render: r => `<span style="color:var(--blue);font-size:11px">${esc(r.chain)}</span>` },
      { key: 'tx_hash',    label: 'Tx Hash',      render: r => `<span class="cell-hash">${esc((r.tx_hash||'—').slice(0,16))}…</span>` },
      { key: 'created_at', label: 'Created',      render: tsCell },
    ],
    order: 'created_at',
    realtime: true,
  },
  user_summary: {
    cols: [
      { key: 'id',                label: 'ID',           render: uuidCell },
      { key: 'email',             label: 'Email',        render: r => `<span class="cell-email">${esc(r.email)}</span>` },
      { key: 'total_missions',    label: 'Missions',     render: r => `<span class="cell-num">${r.total_missions}</span>` },
      { key: 'completed_missions',label: 'Completed',    render: r => `<span class="cell-num">${r.completed_missions}</span>` },
      { key: 'olst_balance',      label: 'OLST Balance', render: r => `<span class="cell-num">${Number(r.olst_balance).toFixed(4)}</span>` },
      { key: 'last_mission_at',   label: 'Last Mission', render: tsCell },
    ],
    order: null,
    realtime: false,
  },
  mission_feed: {
    cols: [
      { key: 'id',          label: 'ID',        render: uuidCell },
      { key: 'mission',     label: 'Mission',   render: r => `<code style="color:var(--teal);font-size:11px">${esc(r.mission)}</code>` },
      { key: 'status',      label: 'Status',    render: r => `<span class="badge badge-${esc(r.status)}">${esc(r.status)}</span>` },
      { key: 'user_email',  label: 'User',      render: r => `<span class="cell-email">${esc(r.user_email)}</span>` },
      { key: 'latency_ms',  label: 'Latency',   render: r => r.latency_ms ? `<span class="cell-num">${r.latency_ms}ms</span>` : '—' },
      { key: 'created_at',  label: 'Created',   render: tsCell },
    ],
    order: null,
    realtime: false,
  },
};

// ── CONNECT ────────────────────────────────────────────────────────────────
document.getElementById('btnConnect').addEventListener('click', connect);
document.getElementById('supabaseUrl').addEventListener('keydown', e => { if(e.key==='Enter') connect(); });
document.getElementById('supabaseKey').addEventListener('keydown', e => { if(e.key==='Enter') connect(); });

async function connect() {
  const url = document.getElementById('supabaseUrl').value.trim();
  const key = document.getElementById('supabaseKey').value.trim();
  if (!url || !key) { setStatus('Enter Supabase URL and key', 'err'); return; }

  try {
    supabase = createClient(url, key, { auth: { persistSession: false } });
    // Test connection
    const { error } = await supabase.from('users').select('id').limit(1);
    if (error) throw error;
    setConnected(true);
    await loadTable(currentTable);
    loadCounts();
  } catch(err) {
    setConnected(false);
    setStatus('Connection failed: ' + err.message, 'err');
  }
}

function setConnected(ok) {
  document.getElementById('connDot').className   = 'conn-dot' + (ok ? ' live' : '');
  document.getElementById('connLabel').textContent = ok ? 'CONNECTED' : 'DISCONNECTED';
  document.getElementById('btnConnect').disabled = ok;
}

// ── LOAD TABLE ─────────────────────────────────────────────────────────────
async function loadTable(tableName) {
  if (!supabase) return;
  currentTable = tableName;

  setStatus('Loading ' + tableName + '…');
  document.getElementById('panelTitle').textContent = tableName;
  document.getElementById('sbTable').textContent    = tableName;

  // Highlight active tab + sidebar
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.table === tableName));
  document.querySelectorAll('.sb-item').forEach(t => t.classList.toggle('active', t.dataset.table === tableName));

  const schema = SCHEMAS[tableName];
  if (!schema) return;

  try {
    let q = supabase.from(tableName).select('*').limit(500);
    if (schema.order) q = q.order(schema.order, { ascending: false });

    const { data, error } = await q;
    if (error) throw error;

    allRows = data || [];
    sortCol = null;
    renderTable(allRows);
    document.getElementById('sbRows').textContent   = allRows.length;
    document.getElementById('sbLoaded').textContent = new Date().toLocaleTimeString('en-US',{hour12:false});
    setStatus('Loaded ' + allRows.length + ' rows');

    // Realtime
    stopRealtime();
    if (schema.realtime) startRealtime(tableName);

  } catch(err) {
    setStatus('Error: ' + err.message, 'err');
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty-state"><div class="empty-icon">✗</div>${esc(err.message)}</div>`;
  }
}

// ── RENDER TABLE ───────────────────────────────────────────────────────────
function renderTable(rows) {
  const schema = SCHEMAS[currentTable];
  if (!schema) return;

  const search = (document.getElementById('searchBox').value || '').toLowerCase();
  let filtered = rows;
  if (search) {
    filtered = rows.filter(r => JSON.stringify(r).toLowerCase().includes(search));
  }

  if (!filtered.length) {
    document.getElementById('tableWrap').innerHTML =
      `<div class="empty-state"><div class="empty-icon">◫</div>No rows found</div>`;
    return;
  }

  const thead = schema.cols.map((c,i) => {
    const cls = sortCol === i ? (sortAsc ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" data-col="${i}">${c.label}</th>`;
  }).join('');

  const tbody = filtered.map((row, ri) => {
    const cells = schema.cols.map(c => `<td>${c.render(row)}</td>`).join('');
    return `<tr style="animation-delay:${Math.min(ri*15,200)}ms" data-idx="${ri}" class="row-clickable">${cells}</tr>`;
  }).join('');

  document.getElementById('tableWrap').innerHTML =
    `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;

  // Sort headers
  document.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', () => {
      const ci = parseInt(th.dataset.col);
      if (sortCol === ci) sortAsc = !sortAsc;
      else { sortCol = ci; sortAsc = true; }
      const key = schema.cols[ci].key;
      const sorted = [...filtered].sort((a, b) => {
        const av = a[key], bv = b[key];
        if (av == null) return 1;
        if (bv == null) return -1;
        return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
      });
      renderTable(sorted);
    });
  });

  // Row click → drawer
  document.querySelectorAll('.row-clickable').forEach(tr => {
    tr.addEventListener('click', () => openDrawer(filtered[parseInt(tr.dataset.idx)]));
  });
}

// ── SEARCH ─────────────────────────────────────────────────────────────────
document.getElementById('searchBox').addEventListener('input', () => renderTable(allRows));

// ── REFRESH ────────────────────────────────────────────────────────────────
document.getElementById('btnRefresh').addEventListener('click', () => loadTable(currentTable));

// ── CSV EXPORT ─────────────────────────────────────────────────────────────
document.getElementById('btnExport').addEventListener('click', () => {
  if (!allRows.length) return;
  const keys  = Object.keys(allRows[0]);
  const lines = [keys.join(','), ...allRows.map(r =>
    keys.map(k => JSON.stringify(r[k] ?? '')).join(',')
  )];
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `${currentTable}_${Date.now()}.csv`;
  a.click();
});

// ── REALTIME ───────────────────────────────────────────────────────────────
function startRealtime(tableName) {
  if (!supabase) return;
  realtimeChannel = supabase
    .channel('admin:' + tableName)
    .on('postgres_changes', { event: '*', schema: 'public', table: tableName }, payload => {
      document.getElementById('rtDot').className = 'rt-dot active';
      document.getElementById('rtLabel').textContent = 'Realtime: live';
      setStatus('Realtime: ' + payload.eventType + ' on ' + tableName);

      // Patch local cache
      if (payload.eventType === 'INSERT') {
        allRows.unshift(payload.new);
      } else if (payload.eventType === 'UPDATE') {
        const i = allRows.findIndex(r => r.id === payload.new.id);
        if (i >= 0) allRows[i] = payload.new;
      } else if (payload.eventType === 'DELETE') {
        allRows = allRows.filter(r => r.id !== payload.old.id);
      }
      renderTable(allRows);
      document.getElementById('sbRows').textContent = allRows.length;
    })
    .subscribe();
}

function stopRealtime() {
  if (realtimeChannel && supabase) {
    supabase.removeChannel(realtimeChannel);
    realtimeChannel = null;
  }
  document.getElementById('rtDot').className   = 'rt-dot';
  document.getElementById('rtLabel').textContent = 'Realtime: off';
}

// ── COUNT ALL TABLES ───────────────────────────────────────────────────────
async function loadCounts() {
  if (!supabase) return;
  const tables = ['users', 'missions', 'audit_logs', 'olst_tokens'];
  const ids    = ['sb-users','sb-missions','sb-audit','sb-olst'];
  const tids   = ['tc-users','tc-missions','tc-audit','tc-olst'];
  await Promise.all(tables.map(async (t, i) => {
    const { count } = await supabase.from(t).select('*', { count:'exact', head:true });
    const n = count ?? '?';
    document.getElementById(ids[i]).textContent = n;
    document.getElementById(tids[i]).textContent = n;
  }));
}

// ── TAB / SIDEBAR NAVIGATION ───────────────────────────────────────────────
document.querySelectorAll('[data-table]').forEach(el => {
  el.addEventListener('click', () => loadTable(el.dataset.table));
});

// ── DRAWER ────────────────────────────────────────────────────────────────
function openDrawer(row) {
  const drawer = document.getElementById('drawer');
  const body   = document.getElementById('drawerBody');
  document.getElementById('drawerTitle').textContent = currentTable + ' · row';

  body.innerHTML = Object.entries(row).map(([k, v]) => {
    const isJson = v && typeof v === 'object';
    const display = isJson
      ? `<pre class="drawer-json">${JSON.stringify(v, null, 2)}</pre>`
      : `<div class="drawer-val">${esc(String(v ?? '—'))}</div>`;
    return `<div class="drawer-field"><div class="drawer-label">${esc(k)}</div>${display}</div>`;
  }).join('');

  drawer.classList.add('open');
}

window.closeDrawer = function() {
  document.getElementById('drawer').classList.remove('open');
};

// ── STATUS ─────────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('sbStatus').textContent = msg;
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function uuidCell(row, key = 'id') {
  const v = row[key] || '';
  return `<span class="cell-uuid" title="${esc(v)}">${esc(v.slice(0,8))}…</span>`;
}
function tsCell(row, key = 'created_at') {
  const v = row[key];
  if (!v) return '<span class="cell-ts">—</span>';
  const d = new Date(v);
  return `<span class="cell-ts" title="${esc(v)}">${d.toLocaleDateString()} ${d.toLocaleTimeString('en-US',{hour12:false})}</span>`;
}
</script>
</body>
