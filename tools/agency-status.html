<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>O LIFE — Agency Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #0a0c10;
  --paper:     #0f1218;
  --card:      #13181f;
  --edge:      #1c2430;
  --edge2:     #243040;
  --smoke:     #2e4055;
  --fog:       #4a6278;
  --text:      #8fa8bc;
  --hi:        #dceef8;
  --online:    #00e5a0;
  --online-bg: rgba(0,229,160,.07);
  --online-bd: rgba(0,229,160,.25);
  --offline:   #ff4d6d;
  --offline-bg:rgba(255,77,109,.07);
  --offline-bd:rgba(255,77,109,.25);
  --checking:  #f0a500;
  --check-bg:  rgba(240,165,0,.07);
  --check-bd:  rgba(240,165,0,.25);
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

html { background: var(--ink); }
body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0,229,160,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 90%, rgba(0,160,255,.03) 0%, transparent 60%),
    var(--ink);
  font-family: var(--font-body);
  color: var(--text);
  padding: 48px 24px 80px;
}

/* ── Grid noise overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  opacity: .018;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
}

.wrap { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; }

/* ── Header ── */
.masthead {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 52px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--edge);
}
.masthead-left {}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--smoke); margin-bottom: 8px;
}
h1 {
  font-family: var(--font-head);
  font-size: clamp(48px, 8vw, 80px);
  color: var(--hi);
  line-height: .9;
  letter-spacing: .02em;
}
h1 span { color: var(--online); }

.master-status {
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
}
.master-count {
  font-family: var(--font-head);
  font-size: 48px; line-height: 1;
  color: var(--hi);
}
.master-count em { color: var(--online); font-style: normal; }
.master-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; color: var(--fog); text-transform: uppercase; }
.poll-status {
  font-family: var(--font-mono); font-size: 10px; color: var(--smoke);
  letter-spacing: .06em;
}
.poll-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--smoke);
  margin-right: 6px; vertical-align: middle;
  transition: background .3s;
}
.poll-dot.active { background: var(--online); box-shadow: 0 0 8px var(--online); animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: .3; } }

/* ── Controls ── */
.controls {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 32px;
}
.ctrl-btn {
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 9px 20px; border-radius: 4px;
  border: 1px solid var(--edge2);
  background: transparent; color: var(--fog);
  cursor: pointer; transition: all .18s;
}
.ctrl-btn:hover { border-color: var(--online); color: var(--online); background: var(--online-bg); }
.ctrl-btn.primary { border-color: var(--online); color: var(--online); background: var(--online-bg); }
.ctrl-interval {
  font-family: var(--font-mono); font-size: 11px; color: var(--fog);
  letter-spacing: .06em; margin-left: auto;
}
select {
  font-family: var(--font-mono); font-size: 11px;
  background: var(--card); border: 1px solid var(--edge2);
  color: var(--text); padding: 8px 12px; border-radius: 4px;
  cursor: pointer; outline: none; margin-left: 6px;
}
select:focus { border-color: var(--online); }

/* ── Agency grid ── */
.agency-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
  margin-bottom: 48px;
}

/* ── Agency card ── */
.agency-card {
  background: var(--card);
  border: 1px solid var(--edge);
  border-radius: 10px;
  padding: 20px 22px 16px;
  position: relative; overflow: hidden;
  transition: border-color .25s, transform .2s;
  cursor: default;
  animation: cardReveal .4s ease both;
}
.agency-card:nth-child(1)  { animation-delay: .03s; }
.agency-card:nth-child(2)  { animation-delay: .06s; }
.agency-card:nth-child(3)  { animation-delay: .09s; }
.agency-card:nth-child(4)  { animation-delay: .12s; }
.agency-card:nth-child(5)  { animation-delay: .15s; }
.agency-card:nth-child(6)  { animation-delay: .18s; }
.agency-card:nth-child(7)  { animation-delay: .21s; }
.agency-card:nth-child(8)  { animation-delay: .24s; }
.agency-card:nth-child(9)  { animation-delay: .27s; }
.agency-card:nth-child(10) { animation-delay: .30s; }
@keyframes cardReveal {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: none; }
}

.agency-card:hover { transform: translateY(-2px); }

/* Status-driven card states */
.agency-card.online  { border-color: var(--online-bd); background: linear-gradient(160deg, #13181f 60%, rgba(0,229,160,.03)); }
.agency-card.offline { border-color: var(--offline-bd); }
.agency-card.checking{ border-color: var(--check-bd); }

/* Accent bar */
.agency-card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--edge); transition: background .3s;
}
.agency-card.online::after  { background: var(--online); }
.agency-card.offline::after { background: var(--offline); }
.agency-card.checking::after{ background: var(--checking); animation: shimmer 1.2s linear infinite; }
@keyframes shimmer {
  0%   { opacity: 1; }
  50%  { opacity: .3; }
  100% { opacity: 1; }
}

/* Card header */
.card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
.status-indicator {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
  background: var(--edge2); transition: background .3s, box-shadow .3s;
}
.online  .status-indicator { background: var(--online);  box-shadow: 0 0 12px var(--online); }
.offline .status-indicator { background: var(--offline); box-shadow: 0 0 8px var(--offline); }
.checking .status-indicator {
  background: var(--checking);
  animation: checkPulse .8s ease-in-out infinite;
}
@keyframes checkPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.5} }

.card-name-block { flex: 1; min-width: 0; }
.card-name {
  font-family: var(--font-head);
  font-size: 22px; letter-spacing: .04em;
  color: var(--hi); line-height: 1;
  text-transform: uppercase;
}
.card-mission {
  font-family: var(--font-mono); font-size: 9px;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--fog); margin-top: 3px;
}

.port-chip {
  font-family: var(--font-mono); font-size: 10px;
  color: var(--smoke); background: var(--edge);
  border-radius: 3px; padding: 3px 8px;
  flex-shrink: 0; align-self: flex-start;
  margin-top: 2px;
}

/* Status text */
.status-text {
  font-family: var(--font-mono); font-size: 12px;
  padding: 9px 12px; border-radius: 6px;
  background: var(--online-bg); color: var(--online);
  border: 1px solid var(--online-bd);
  margin-bottom: 12px;
  transition: all .3s;
  min-height: 38px; display: flex; align-items: center;
}
.offline  .status-text { background: var(--offline-bg); color: var(--offline);  border-color: var(--offline-bd); }
.checking .status-text { background: var(--check-bg);   color: var(--checking); border-color: var(--check-bd);  }
.unknown  .status-text { background: transparent; color: var(--fog); border-color: var(--edge); }

/* Latency sparkline */
.spark-row { display: flex; align-items: flex-end; gap: 3px; height: 28px; margin-bottom: 10px; }
.spark-bar {
  flex: 1; border-radius: 2px 2px 0 0; min-height: 2px;
  background: var(--edge2); transition: height .3s ease, background .3s;
}

/* Meta row */
.card-meta { display: flex; align-items: center; gap: 0; }
.meta-item {
  flex: 1; text-align: center;
  padding: 8px 4px;
  border-right: 1px solid var(--edge);
}
.meta-item:last-child { border-right: none; }
.meta-val {
  font-family: var(--font-mono); font-size: 13px;
  color: var(--hi); line-height: 1;
}
.meta-lbl {
  font-size: 8px; letter-spacing: .12em; text-transform: uppercase;
  color: var(--smoke); margin-top: 3px;
}

/* ── Log panel ── */
.log-section { margin-top: 12px; }
.log-title {
  font-family: var(--font-mono); font-size: 10px;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--fog); margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.log-title::after { content: ''; flex: 1; height: 1px; background: var(--edge); }
.log-feed {
  background: var(--paper); border: 1px solid var(--edge);
  border-radius: 8px; overflow: hidden;
  font-family: var(--font-mono); font-size: 11px;
}
.log-entry {
  display: grid;
  grid-template-columns: 80px 60px 1fr 70px;
  gap: 0;
  padding: 8px 16px;
  border-bottom: 1px solid var(--edge);
  animation: logSlide .2s ease;
  transition: background .1s;
}
.log-entry:hover { background: var(--card); }
.log-entry:last-child { border-bottom: none; }
@keyframes logSlide { from{opacity:0;transform:translateX(-6px)} to{opacity:1;transform:none} }

.log-time  { color: var(--smoke); }
.log-port  { color: var(--fog); }
.log-msg   { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-ms    { text-align: right; }
.log-ms.fast   { color: var(--online); }
.log-ms.slow   { color: var(--checking); }
.log-ms.err    { color: var(--offline); }
.log-empty { padding: 24px 16px; color: var(--smoke); text-align: center; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--edge2); border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── Header ── -->
  <div class="masthead">
    <div class="masthead-left">
      <div class="eyebrow">O LIFE Supreme Intelligence · Agency Layer</div>
      <h1>AGENCY<br><span>STATUS</span></h1>
    </div>
    <div class="master-status">
      <div class="master-count"><em id="onlineCount">—</em> / 10</div>
      <div class="master-label">Agencies Online</div>
      <div class="poll-status" style="margin-top:8px">
        <span class="poll-dot" id="pollDot"></span>
        <span id="pollLabel">Initializing…</span>
      </div>
    </div>
  </div>

  <!-- ── Controls ── -->
  <div class="controls">
    <button class="ctrl-btn primary" id="btnPollNow">Poll Now</button>
    <button class="ctrl-btn" id="btnToggle">Pause</button>
    <div class="ctrl-interval">
      Auto-poll every
      <select id="intervalSelect">
        <option value="5000">5s</option>
        <option value="10000" selected>10s</option>
        <option value="30000">30s</option>
        <option value="60000">60s</option>
      </select>
    </div>
  </div>

  <!-- ── Agency cards ── -->
  <div class="agency-grid" id="agencyGrid"></div>

  <!-- ── Log ── -->
  <div class="log-section">
    <div class="log-title">Poll Log</div>
    <div class="log-feed">
      <div class="log-entry" style="background:var(--card);border-bottom:1px solid var(--edge2);opacity:.7">
        <span class="log-time" style="color:var(--fog)">TIME</span>
        <span class="log-port" style="color:var(--fog)">PORT</span>
        <span class="log-msg" style="color:var(--fog)">STATUS</span>
        <span class="log-ms" style="color:var(--fog);text-align:right">LATENCY</span>
      </div>
      <div id="logFeed"><div class="log-empty">No polls yet — starting shortly…</div></div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── Agency definitions (matches docker-compose ports) ─────────────────────
  const AGENCIES = [
    { port: 8000, name: 'Savings',    mission: 'M1 · Wealth Creation'    },
    { port: 8080, name: 'Health',     mission: 'M5 · Wellbeing'          },
    { port: 8090, name: 'Dating',     mission: 'M4 · Connection'         },
    { port: 8095, name: 'Quantum',    mission: 'M6 · Truth & Foresight'  },
    { port: 8101, name: 'Prediction', mission: 'M6 · Prediction Markets' },
    { port: 8110, name: 'Concierge',  mission: 'M2 · Lifestyle'          },
    { port: 8120, name: 'Comms',      mission: 'M2 · Learning'           },
    { port: 8130, name: 'Trading',    mission: 'M1 · Markets'            },
    { port: 8140, name: 'Booking',    mission: 'M2 · Travel'             },
    { port: 8150, name: 'Delivery',   mission: 'M2 · Procurement'        },
  ];

  // ── State ─────────────────────────────────────────────────────────────────
  const state = {};       // port → { status, latencyHistory[], checks, errors, lastMs }
  AGENCIES.forEach(({ port }) => {
    state[port] = { status: 'unknown', latencyHistory: [], checks: 0, errors: 0, lastMs: null };
  });

  let pollInterval = 10_000;
  let pollTimer    = null;
  let paused       = false;
  let logEntries   = [];

  // ── Build cards ───────────────────────────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById('agencyGrid');
    grid.innerHTML = '';
    AGENCIES.forEach(({ port, name, mission }) => {
      const card = document.createElement('div');
      card.className = 'agency-card unknown';
      card.id = `card-${port}`;
      card.innerHTML = `
        <div class="card-head">
          <div class="status-indicator"></div>
          <div class="card-name-block">
            <div class="card-name">${name}</div>
            <div class="card-mission">${mission}</div>
          </div>
          <div class="port-chip">:${port}</div>
        </div>
        <div class="status-text" id="status-${port}">Waiting for poll…</div>
        <div class="spark-row" id="spark-${port}">
          ${Array(12).fill('<div class="spark-bar"></div>').join('')}
        </div>
        <div class="card-meta">
          <div class="meta-item">
            <div class="meta-val" id="meta-checks-${port}">0</div>
            <div class="meta-lbl">Checks</div>
          </div>
          <div class="meta-item">
            <div class="meta-val" id="meta-uptime-${port}">—</div>
            <div class="meta-lbl">Uptime</div>
          </div>
          <div class="meta-item">
            <div class="meta-val" id="meta-avg-${port}">—</div>
            <div class="meta-lbl">Avg ms</div>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  }

  // ── Core: checkAgencyStatus ───────────────────────────────────────────────
  // Full implementation of the provided stub — enriched with timing,
  // retry logic, history tracking, and DOM updates.
  async function checkAgencyStatus(port) {
    const s    = state[port];
    const card = document.getElementById(`card-${port}`);
    const text = document.getElementById(`status-${port}`);

    // Mark checking
    card.className = 'agency-card checking';
    text.textContent = 'Checking…';

    const start = performance.now();

    try {
      const controller = new AbortController();
      const timeout    = setTimeout(() => controller.abort(), 5000);

      const res = await fetch(`http://localhost:${port}/health`, {
        signal: controller.signal,
        cache:  'no-store',
      });
      clearTimeout(timeout);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data    = await res.json();
      const elapsed = Math.round(performance.now() - start);

      // Use server-reported latency if available, otherwise measured
      const displayMs = data.latency_ms ?? elapsed;

      // ── Exact original contract ──
      document.getElementById(`status-${port}`).textContent =
        `✅ Online · ${displayMs}ms`;

      // ── Enriched state ──
      s.status = 'online';
      s.lastMs = displayMs;
      s.checks++;
      s.latencyHistory.push(displayMs);
      if (s.latencyHistory.length > 12) s.latencyHistory.shift();

      card.className = 'agency-card online';
      updateSparkline(port);
      updateMeta(port);
      addLog(port, `Online · v${data.version ?? '?'}`, displayMs, 'ok');

    } catch (err) {
      const elapsed = Math.round(performance.now() - start);
      const isTimeout = err.name === 'AbortError';

      // ── Exact original contract ──
      document.getElementById(`status-${port}`).textContent =
        `🔌 Offline · configure port ${port}`;

      // ── Enriched state ──
      s.status = 'offline';
      s.lastMs = null;
      s.checks++;
      s.errors++;

      card.className = 'agency-card offline';
      updateMeta(port);
      addLog(port, isTimeout ? 'Timeout (5s)' : `Offline · ${err.message}`, elapsed, 'err');
    }

    refreshMasterCount();
  }

  // ── Sparkline ─────────────────────────────────────────────────────────────
  function updateSparkline(port) {
    const history = state[port].latencyHistory;
    if (!history.length) return;
    const row  = document.getElementById(`spark-${port}`);
    const bars = row.querySelectorAll('.spark-bar');
    const max  = Math.max(...history, 1);

    bars.forEach((bar, i) => {
      const val = history[i] ?? 0;
      const pct = val ? Math.max(10, (val / max) * 100) : 0;
      bar.style.height    = pct + '%';
      bar.style.background = val > 500 ? 'var(--checking)' : val > 200 ? 'var(--online)' : 'var(--online)';
      bar.style.opacity   = val ? '1' : '.15';
    });
  }

  // ── Meta stats ────────────────────────────────────────────────────────────
  function updateMeta(port) {
    const s       = state[port];
    const checks  = s.checks;
    const errors  = s.errors;
    const ok      = checks - errors;
    const uptime  = checks > 0 ? Math.round((ok / checks) * 100) + '%' : '—';
    const history = s.latencyHistory;
    const avg     = history.length
      ? Math.round(history.reduce((a, b) => a + b, 0) / history.length) + 'ms'
      : '—';

    document.getElementById(`meta-checks-${port}`).textContent = checks;
    document.getElementById(`meta-uptime-${port}`).textContent = uptime;
    document.getElementById(`meta-avg-${port}`).textContent    = avg;
  }

  // ── Master online count ───────────────────────────────────────────────────
  function refreshMasterCount() {
    const online = Object.values(state).filter(s => s.status === 'online').length;
    document.getElementById('onlineCount').textContent = online;
  }

  // ── Log ───────────────────────────────────────────────────────────────────
  const MAX_LOG = 60;

  function addLog(port, msg, ms, kind) {
    logEntries.unshift({ port, msg, ms, kind, ts: new Date() });
    if (logEntries.length > MAX_LOG) logEntries.pop();
    renderLog();
  }

  function renderLog() {
    const feed = document.getElementById('logFeed');
    if (!logEntries.length) {
      feed.innerHTML = '<div class="log-empty">No polls yet…</div>';
      return;
    }
    feed.innerHTML = logEntries.slice(0, 30).map(({ port, msg, ms, kind, ts }) => {
      const time   = ts.toLocaleTimeString('en-US', { hour12: false });
      const msText = kind === 'err' ? 'fail' : ms + 'ms';
      const msCls  = kind === 'err' ? 'err' : ms > 500 ? 'slow' : 'fast';
      return `<div class="log-entry">
        <span class="log-time">${time}</span>
        <span class="log-port">:${port}</span>
        <span class="log-msg">${msg}</span>
        <span class="log-ms ${msCls}">${msText}</span>
      </div>`;
    }).join('');
  }

  // ── Poll all agencies ─────────────────────────────────────────────────────
  // Fan-out in parallel — all 10 checks fire simultaneously
  async function pollAll() {
    if (paused) return;
    const dot   = document.getElementById('pollDot');
    const label = document.getElementById('pollLabel');
    dot.classList.add('active');
    label.textContent = 'Polling…';

    await Promise.allSettled(AGENCIES.map(({ port }) => checkAgencyStatus(port)));

    dot.classList.remove('active');
    label.textContent = `Last poll ${new Date().toLocaleTimeString()}`;
  }

  // ── Scheduler ─────────────────────────────────────────────────────────────
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollAll, pollInterval);
  }

  // ── Controls ──────────────────────────────────────────────────────────────
  document.getElementById('btnPollNow').addEventListener('click', pollAll);

  document.getElementById('btnToggle').addEventListener('click', function () {
    paused = !paused;
    this.textContent = paused ? 'Resume' : 'Pause';
    this.classList.toggle('primary', !paused);
    document.getElementById('pollDot').classList.toggle('active', !paused);
    document.getElementById('pollLabel').textContent = paused ? 'Paused' : 'Running';
  });

  document.getElementById('intervalSelect').addEventListener('change', function () {
    pollInterval = parseInt(this.value);
    startPolling();
  });

  // ── Boot ──────────────────────────────────────────────────────────────────
  buildGrid();
  pollAll();          // immediate first poll
  startPolling();     // then on schedule

})();
</script>
</body>
</html>
